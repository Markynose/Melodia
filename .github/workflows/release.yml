name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true
      tag:
        description: 'Tag (e.g. v0.1.0)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild Melodia/Melodia.csproj /t:Restore /p:Configuration=Release

      - name: Create self-signed certificate (CN=Mark, matches manifest)
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=Mark" `
            -KeyUsage DigitalSignature `
            -FriendlyName "Melodia" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
          $pwd = ConvertTo-SecureString -String "melodia" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\melodia.pfx" -Password $pwd
          Export-Certificate   -Cert $cert -FilePath "$env:GITHUB_WORKSPACE\melodia.cer"

      - name: Build MSIX
        shell: pwsh
        run: |
          msbuild Melodia/Melodia.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxPackageDir="$env:GITHUB_WORKSPACE\AppPackages\" `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile="$env:GITHUB_WORKSPACE\melodia.pfx" `
            /p:PackageCertificatePassword="melodia"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Melodia ${{ github.event.inputs.version }}
          body: |
            ## melodia ${{ github.event.inputs.version }}

            ### installing
            1. download `melodia.cer` and double-click it → install to **Local Machine → Trusted Root**
            2. double-click the `.msix` to install

            > requires windows 10 1803 or later
          files: |
            AppPackages/**/*.msix
            melodia.cer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
